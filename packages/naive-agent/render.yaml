# naive-agent. One web service + Postgres.
# Builds from the repo root so the npm workspaces resolve.

projects:
  - name: yuklungng-agents-workshop-naive
    environments:
      - name: production
        databases:
          - name: yuklungng-naive-agent-db
            plan: basic-256mb
            region: oregon
            postgresMajorVersion: "18"

        services:
          - type: web
            name: yuklungng-naive-agent
            runtime: node
            region: oregon
            plan: starter
            buildCommand: npm ci
            startCommand: npm run start --workspace @workshop/naive-agent
            healthCheckPath: /healthz
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: yuklungng-naive-agent-db
                  property: connectionString
              - key: NODE_ENV
                value: production
